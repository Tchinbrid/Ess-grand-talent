<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L'ESS a un Grand Talent</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a6030;
      --black:#080808;--deep:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;
      --text:#f0e8d8;--muted:#7a7060;
    }
    html{scroll-behavior:smooth}
    body{background:var(--black);color:var(--text);font-family:'Times New Roman',Times,serif;font-weight:400;overflow-x:hidden;min-height:100vh}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);border-bottom:1px solid rgba(201,168,76,0.15);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:58px}
    .header-title{font-family:'Times New Roman',Times,serif;font-size:1.1rem;letter-spacing:0.1em;color:var(--gold)}

    /* HAMBURGER */
    .hamburger{cursor:pointer;padding:10px;z-index:400;position:relative;background:none;border:none}
    .hamburger div{width:25px;height:2px;background:var(--gold);margin:5px 0;transition:all 0.3s}

    /* DRAWER OVERLAY */
    .drawer-overlay{position:fixed;inset:0;z-index:290;background:rgba(0,0,0,0.7);display:none}
    .drawer-overlay.open{display:block}

    /* DRAWER */
    .drawer{position:fixed;top:0;right:0;bottom:0;width:min(290px,82vw);background:var(--deep);border-left:1px solid rgba(201,168,76,0.15);z-index:300;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;padding:70px 0 40px}
    .drawer.open{transform:translateX(0)}
    .drawer-item{text-decoration:none;font-family:'Times New Roman',Times,serif;font-size:0.85rem;letter-spacing:0.1em;color:var(--muted);padding:18px 28px;border-bottom:1px solid rgba(201,168,76,0.07);display:block;transition:color .2s}
    .drawer-item:hover{color:var(--gold)}

    /* PAGES */
    .page{display:none;position:relative;z-index:1}
    .page.active{display:block}

    /* CONTAINER */
    .container{max-width:660px;margin:0 auto;padding:32px 18px 80px;display:flex;flex-direction:column;gap:30px}

    /* HERO */
    .hero-block{text-align:center}
    .hero-eyebrow{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .hero-title{font-family:'Times New Roman',Times,serif;font-size:clamp(1.6rem,5vw,2.5rem);font-weight:400;line-height:1.3;color:var(--text)}
    .hero-title em{font-style:italic;color:var(--gold)}
    .hero-sub{font-size:0.7rem;color:var(--muted);margin-top:10px;line-height:2}

    /* LOGOS */
    .logos-block{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
    .logo-box{display:flex;flex-direction:column;align-items:center;gap:8px}
    .logo-frame{width:110px;height:110px;border:1px solid rgba(201,168,76,0.22);background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .logo-frame img{width:100%;height:100%;object-fit:contain;padding:6px}
    .logo-label{font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:center;max-width:110px;line-height:1.5}
    .logo-sep{width:1px;height:65px;background:linear-gradient(to bottom,transparent,var(--gold-dim),transparent)}

    /* DIVIDER */
    .divider{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent)}

    /* SECTION LABEL */
    .section-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:8px}

    /* AFFICHE */
    .affiche-frame{width:100%;border:1px solid rgba(201,168,76,.18);background:var(--surface);overflow:hidden}
    .affiche-frame img{width:100%;height:auto;display:block}

    /* INFO CARDS */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
    .info-card{background:var(--surface);padding:24px 20px;position:relative;overflow:hidden}
    .info-card.full{grid-column:1/-1}
    .info-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gold-dim)}
    .card-label{font-size:0.5rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
    .card-value{font-family:'Times New Roman',Times,serif;font-size:2rem;letter-spacing:.05em;color:var(--gold);line-height:1}
    .card-sub{font-size:0.58rem;color:var(--muted);margin-top:6px;line-height:1.8}
    .card-sub strong{color:var(--gold)}

    /* VOTE BTN */
    .vote-block{text-align:center}
    .btn-vote{display:inline-block;background:var(--gold);color:var(--black);text-decoration:none;font-size:0.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:16px 48px;border:none;cursor:pointer;font-family:'Times New Roman',Times,serif}
    .btn-vote:hover{background:var(--gold-light)}
    .vote-note{font-size:0.52rem;letter-spacing:.12em;color:var(--muted);margin-top:10px}

    /* CONTACT */
    .contact-block{background:var(--surface);border:1px solid rgba(201,168,76,.12);padding:26px 22px}
    .contact-nums{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .contact-pill{display:flex;align-items:center;gap:10px;background:var(--deep);border:1px solid rgba(201,168,76,.12);padding:14px 18px;flex:1;min-width:160px}
    .contact-pill a{text-decoration:none;font-family:'Times New Roman',Times,serif;font-size:1rem;letter-spacing:.08em;color:var(--text)}

    /* PAGE TITLES */
    .page-title{font-family:'Times New Roman',Times,serif;font-size:clamp(1.5rem,5vw,2.2rem);font-weight:400;color:var(--text);margin-bottom:5px}
    .page-title em{font-style:italic;color:var(--gold)}
    .page-subtitle{font-size:0.6rem;letter-spacing:.1em;color:var(--muted);margin-bottom:20px;line-height:1.9}

    /* CATEGORIES */
    .cat-section{margin-bottom:28px}
    .cat-title{font-family:'Times New Roman',Times,serif;font-size:1.1rem;color:var(--gold);border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:8px;margin-bottom:12px;font-style:italic}
    .candidate-card{background:var(--surface);border-left:3px solid transparent;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:2px;transition:border-color .2s}
    .candidate-card:hover{border-left-color:var(--gold)}
    .cand-id{font-family:'Times New Roman',Times,serif;font-size:1.3rem;color:var(--gold-dim);width:36px;flex-shrink:0}
    .cand-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;border:1px solid rgba(201,168,76,.3);flex-shrink:0}
    .cand-avatar img{width:100%;height:100%;object-fit:cover}
    .cand-info{flex:1}
    .cand-name{font-family:'Times New Roman',Times,serif;font-size:1rem;color:var(--text)}
    .cand-niveau{font-size:0.5rem;letter-spacing:.1em;color:var(--muted);margin-top:2px}
    .cand-cat{font-size:0.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-top:2px}

    /* VOTE LIST */
    .vote-note-top{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);padding:13px 16px;font-size:0.6rem;color:var(--muted);line-height:1.9;margin-bottom:16px}
    .vote-note-top strong{color:var(--gold)}
    .vote-list{display:flex;flex-direction:column;gap:2px}
    .vote-row{background:var(--surface);padding:14px 16px;display:flex;align-items:center;gap:12px}
    .vote-count{font-family:'Times New Roman',Times,serif;font-size:1rem;color:var(--text);width:28px;text-align:right;flex-shrink:0}
    .vote-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Times New Roman',Times,serif;font-size:0.6rem;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
    .vote-btn:hover{background:var(--gold);color:var(--black);border-color:var(--gold)}
    .vote-btn.voted{background:var(--surface2);color:var(--gold-dim);border-color:rgba(201,168,76,.1);cursor:not-allowed}

    /* MODAL VOTE */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid rgba(201,168,76,.25);padding:36px 28px;max-width:420px;width:100%;position:relative}
    .modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;font-family:'Times New Roman',Times,serif}
    .modal-title{font-family:'Times New Roman',Times,serif;font-size:1.2rem;font-weight:400;color:var(--gold);margin-bottom:4px}
    .modal-candidat{font-family:'Times New Roman',Times,serif;font-size:1rem;color:var(--text);margin-bottom:20px;font-style:italic}
    .form-label{display:block;font-size:0.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
    .form-input{width:100%;background:var(--deep);border:1px solid rgba(201,168,76,.2);color:var(--text);padding:12px 14px;font-family:'Times New Roman',Times,serif;font-size:0.85rem;outline:none;margin-bottom:16px}
    .form-submit{width:100%;background:var(--gold);color:var(--black);border:none;padding:15px;font-family:'Times New Roman',Times,serif;font-size:0.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;cursor:pointer}
    .form-note{font-size:0.52rem;color:var(--muted);margin-bottom:18px;line-height:1.8}

    /* FOOTER */
    footer{position:relative;z-index:1;text-align:center;padding:22px 20px;border-top:1px solid rgba(201,168,76,.08)}
    .footer-name{font-family:'Times New Roman',Times,serif;font-size:.95rem;letter-spacing:.1em;color:var(--gold-dim);margin-bottom:5px}
    .footer-copy{font-size:0.5rem;letter-spacing:.1em;color:var(--muted)}

    @media(max-width:480px){
      .info-grid{grid-template-columns:1fr}
      .info-card.full{grid-column:auto}
      .logo-frame{width:90px;height:90px}
    }
  </style>
</head>
