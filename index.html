<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L'ESS a un Grand Talent</title>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a6030;
      --black:#080808;--deep:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;
      --text:#f0e8d8;--muted:#7a7060;
    }
    html{scroll-behavior:smooth}
    body{background:var(--black);color:var(--text);font-family:'Times New Roman',Times,serif;font-weight:400;overflow-x:hidden;min-height:100vh}


    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,168,76,0.15);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:58px}
    .header-title{display:flex;align-items:center;gap:8px;font-family:'Times New Roman',Times,serif;font-size:1.1rem;letter-spacing:0.1em;color:var(--gold)}
    .star-spin{display:inline-block}

    /* HAMBURGER */
    .hamburger{background:none;border:none;display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:8px;z-index:200}
    .hamburger span{display:block;width:24px;height:2px;background:var(--gold);transition:transform .35s,opacity .35s;transform-origin:center}
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    /* DRAWER */
    .drawer-overlay{position:fixed;inset:0;z-index:140;background:rgba(0,0,0,0.7);opacity:0;pointer-events:none;transition:opacity .4s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:min(290px,82vw);background:var(--deep);border-left:1px solid rgba(201,168,76,0.15);z-index:150;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:70px 0 40px}
    .drawer.open{transform:translateX(0)}
    .drawer-item{text-decoration:none;font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);padding:16px 28px;border-bottom:1px solid rgba(201,168,76,0.07);transition:color .3s,background .3s;display:flex;align-items:center;gap:12px}
    .drawer-item:hover{color:var(--gold);background:rgba(201,168,76,0.04)}
    .drawer-item .mi{font-size:1rem}

    /* PAGES */
    .page{display:none;position:relative;z-index:1;}
    .page.active{display:block}


    /* CONTAINER */
    .container{max-width:660px;margin:0 auto;padding:32px 18px 80px;display:flex;flex-direction:column;gap:30px}

    /* HERO */
    .hero-block{text-align:center}
    .hero-eyebrow{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .hero-title{font-family:'Times New Roman',Times,serif;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:400;line-height:1.3;color:var(--text)}
    .hero-title em{font-style:italic;color:var(--gold)}
    .hero-sub{font-size:0.63rem;letter-spacing:0.08em;color:var(--muted);margin-top:10px;line-height:2}

    /* LOGOS */
    .logos-block{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
    .logo-box{display:flex;flex-direction:column;align-items:center;gap:8px}
    .logo-frame{width:110px;height:110px;border:1px solid rgba(201,168,76,0.22);background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .3s}

    .logo-frame img{width:100%;height:100%;object-fit:contain;padding:6px}
    .logo-label{font-size:0.46rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:center;max-width:110px;line-height:1.5}
    .logo-sep{width:1px;height:65px;background:linear-gradient(to bottom,transparent,var(--gold-dim),transparent)}

    /* DIVIDER */
    .divider{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent)}

    /* SECTION LABEL */
    .section-label{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;border-bottom:1px solid rgba(201,168,76,.2);padding-bottom:8px}

    /* AFFICHE */
    .affiche-frame{width:100%;border:1px solid rgba(201,168,76,.18);background:var(--surface);overflow:hidden}
    .affiche-frame img{width:100%;height:auto;display:block}

    /* INFO CARDS */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
    .info-card{background:var(--surface);padding:24px 20px;position:relative;overflow:hidden}
    .info-card.full{grid-column:1/-1}
    .info-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gold-dim)}
    .card-icon{font-size:1.3rem;margin-bottom:7px}
    .card-label{font-size:0.48rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
    .card-value{font-family:'Times New Roman',Times,serif;font-size:1.9rem;letter-spacing:.05em;color:var(--gold);line-height:1}
    .card-sub{font-size:0.54rem;color:var(--muted);margin-top:6px;line-height:1.8}
    .card-sub strong{color:var(--gold)}
    .date-val{font-family:'Times New Roman',Times,serif;font-size:1rem;color:var(--text);margin-top:6px;letter-spacing:.05em}

    /* VOTE BTN HOME */
    .vote-block{text-align:center}
    .btn-vote{display:inline-block;background:var(--gold);color:var(--black);text-decoration:none;font-size:0.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:16px 48px;transition:background .3s,transform .2s,box-shadow .3s;cursor:pointer;border:none}
    .btn-vote:hover{background:var(--gold-light)}
    .vote-note{font-size:0.5rem;letter-spacing:.12em;color:var(--muted);margin-top:10px}

    /* CONTACT */
    .contact-block{background:var(--surface);border:1px solid rgba(201,168,76,.12);padding:26px 22px}
    .contact-nums{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
    .contact-pill{display:flex;align-items:center;gap:10px;background:var(--deep);border:1px solid rgba(201,168,76,.12);padding:12px 16px;flex:1;min-width:155px;transition:border-color .3s}

    .contact-pill a{text-decoration:none;font-family:'Times New Roman',Times,serif;font-size:.95rem;letter-spacing:.08em;color:var(--text);transition:color .3s}
    .contact-pill:hover a{color:var(--gold)}

    /* PAGE TITLES */
    .page-title{font-family:'Times New Roman',Times,serif;font-size:clamp(1.5rem,5vw,2.2rem);font-weight:400;color:var(--text);margin-bottom:5px}
    .page-title em{font-style:italic;color:var(--gold)}
    .page-subtitle{font-size:0.58rem;letter-spacing:.1em;color:var(--muted);margin-bottom:0;line-height:1.9}

    /* CAT TABS */
    .cat-tabs{display:flex;flex-wrap:wrap;gap:7px}
    .cat-tab{background:none;border:1px solid rgba(201,168,76,.2);color:var(--muted);font-family:'Times New Roman',Times,serif;font-size:0.55rem;letter-spacing:.14em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:all .3s}
    .cat-tab.active,.cat-tab:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05)}

    /* CANDIDATE CARDS */
    .cand-avatar{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid rgba(201,168,76,.3);flex-shrink:0;transition:border-color .3s}
    .candidate-card:hover .cand-avatar{border-color:var(--gold)}
    .vote-row .cand-avatar{width:46px;height:46px;flex-shrink:0}
    .cand-avatar img{width:100%;height:100%;object-fit:cover}
    .cand-niveau{font-size:0.46rem;letter-spacing:.1em;color:var(--muted);margin-top:2px;margin-bottom:2px}
    .cand-specialite{font-size:0.46rem;letter-spacing:.08em;color:var(--gold-dim);font-style:italic;margin-bottom:2px}
    /* CANDIDATE CARDS */
    .candidates-grid{display:flex;flex-direction:column;gap:2px}
    .candidate-card{background:var(--surface);border-left:3px solid transparent;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .3s,background .3s}
    .candidate-card:hover{border-left-color:var(--gold)}
    .candidate-card.hidden{display:none}
    .cand-id{font-family:'Times New Roman',Times,serif;font-size:1.5rem;color:var(--gold-dim);width:38px;flex-shrink:0;line-height:1}
    .cand-info{flex:1}
    .cand-name{font-family:'Times New Roman',Times,serif;font-size:1.05rem;font-weight:400;color:var(--text)}
    .cand-cat{font-size:0.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-top:3px}
    .cand-badge{font-size:0.48rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(201,168,76,.22);color:var(--muted);padding:5px 9px;white-space:nowrap;flex-shrink:0}

    /* VOTE LIST */
    .vote-note-top{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);padding:13px 16px;font-size:0.56rem;letter-spacing:.08em;color:var(--muted);line-height:1.9}
    .vote-note-top strong{color:var(--gold)}
    .vote-list{display:flex;flex-direction:column;gap:2px}
    .vote-row{background:var(--surface);padding:16px 18px;display:flex;align-items:center;gap:12px;transition:background .3s}
    .vote-row:hover{background:var(--surface2)}
    .vote-count{font-family:'Times New Roman',Times,serif;font-size:1.1rem;color:var(--text);width:28px;text-align:right;flex-shrink:0}
    .vote-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Times New Roman',Times,serif;font-size:0.52rem;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:all .3s;white-space:nowrap;flex-shrink:0}
    .vote-btn:hover{background:var(--gold);color:var(--black);border-color:var(--gold)}
    .vote-btn.voted{background:var(--surface2);color:var(--gold-dim);border-color:rgba(201,168,76,.1);cursor:not-allowed}

    /* FOOTER */
    footer{position:relative;z-index:1;text-align:center;padding:22px 20px;border-top:1px solid rgba(201,168,76,.08)}
    .footer-name{font-family:'Times New Roman',Times,serif;font-size:.95rem;letter-spacing:.15em;color:var(--gold-dim);margin-bottom:5px}
    .footer-copy{font-size:0.48rem;letter-spacing:.1em;color:var(--muted)}

    @media(max-width:480px){
      .info-grid{grid-template-columns:1fr}
      .info-card.full{grid-column:auto}
      .logo-frame{width:90px;height:90px}
    }
  </style>
</head>

<div class="drawer-overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="drawer" id="drawer">

  <a class="drawer-item" href="#" onclick="showPage('categories');closeMenu()">Catégories</a>
